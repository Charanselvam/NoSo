<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Time Limiter</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #161616;
      --accent: #0095f6;
      --accent-hover: #1877f2;
      --text: #ffffff;
      --text-secondary: #aaaaaa;
      --border: #2a2a2a;
      --success: #00c853;
      --gradient: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

       /* Timer Card */
    .timer-section {
      background: var(--card);
      border-radius: 24px;
      padding: 28px 20px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .timer-section::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at center, rgba(0,149,246,0.15) 0%, transparent 70%);
      animation: pulse-glow 7s ease-in-out infinite;
      pointer-events: none;
    }

    .timer-circle {
      width: 132px;
      height: 132px;
      margin: 0 auto 16px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1f1f1f;
      position: relative;
      box-shadow: 
        0 0 0 8px #2a2a2a,
        0 12px 40px rgba(0, 149, 246, 0.2);
      animation: timer-breathe 4s ease-in-out infinite;
      transition: transform 0.4s ease;
    }

    /* Progress Ring using conic-gradient */
    .timer-circle::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(
        var(--accent) 0deg,
        var(--accent) calc(var(--progress) * 3.6deg),
        #333 calc(var(--progress) * 3.6deg),
        #333 360deg
      );
      z-index: 1;
      mask: radial-gradient(farthest-side, transparent 82%, #000 84%);
      -webkit-mask: radial-gradient(farthest-side, transparent 82%, #000 84%);
      transition: background 0.6s ease;
    }

    /* Spinning accent border */
    .timer-circle::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      animation: border-spin 2.2s linear infinite;
      z-index: 2;
    }

    #time {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -1.2px;
      z-index: 3;
      position: relative;
      transition: color 0.5s ease;
    }

    .label {
      font-size: 11.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      font-weight: 500;
      z-index: 3;
      position: relative;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      background: rgba(0, 149, 246, 0.12);
      color: var(--accent);
      border-radius: 30px;
      font-size: 12.5px;
      font-weight: 600;
      margin-top: 12px;
      animation: status-pulse 2.5s ease-in-out infinite;
    }

    /* Animations */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 0.85; transform: scale(1.08); }
    }

    @keyframes timer-breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.04) translateY(-6px); }
    }

    @keyframes border-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    /* Settings Section */
    .settings-section {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin: 18px 0 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #1f1f1f;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: white;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 149, 246, 0.25);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0.2, 0.2, 1);
      margin-top: 8px;
    }

    #save-btn {
      background: linear-gradient(90deg, var(--accent), #00c4ff);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 149, 246, 0.4);
    }

    #save-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(0, 149, 246, 0.5);
    }

    #load-history-btn {
      background: #242424;
      color: white;
      border: 1.5px solid var(--border);
    }

    #load-history-btn:hover {
      background: #2f2f2f;
      transform: translateY(-1px);
    }

    .suggestions {
      max-height: 200px;
      overflow-y: auto;
      margin: 12px 0;
      border-radius: 14px;
      background: #1f1f1f;
      border: 1px solid var(--border);
    }

    .suggestion {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .suggestion:hover {
      background: #333;
      padding-left: 20px;
    }

    .suggestion:last-child {
      border-bottom: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }

    /* Advanced Animations */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    @keyframes timer-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes border-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Smooth entrance animation */
    .timer-section, .settings-section {
      animation: fadeSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) backwards;
    }

    .timer-section { animation-delay: 100ms; }
    .settings-section { animation-delay: 200ms; }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
  </style>
</head>
<body>
  <h1>Site Time Limiter</h1>

  <!-- Timer Section - Revised with Advanced Animation -->
  <div class="timer-section">
    <div class="timer-circle" id="timer-circle">
      <div id="time">00:00</div>
      <div class="label">TIME SPENT TODAY</div>
    </div>
    <div class="status">● LIVE TRACKING</div>
  </div>

  <!-- Settings Section -->
  <div class="settings-section">
    <label>Target Website</label>
    <input id="target-input" type="text" placeholder="instagram.com" />

    <button id="load-history-btn">📊 Load My Most Visited Sites</button>
    
    <div id="suggestions" class="suggestions"></div>

    <label>Daily Time Limit (minutes)</label>
    <input id="limit-input" type="number" min="1" value="30" />

    <label>Search Button Redirects To</label>
    <input id="search-redirect-input" type="url" value="https://google.com" />

    <button id="save-btn">Save & Apply Settings</button>
  </div>

  <div class="footer">
    Resets automatically at midnight
  </div>

  <script src="popup.js"></script>
</body>
</html>
